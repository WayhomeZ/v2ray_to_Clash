port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxy-providers:
  ConfigForge:
    type: http
    url: "https://raw.githubusercontent.com/WayhomeZ/v2ray_to_Clash/main/docs/proxies.yaml"
    path: ./providers/configforge.yaml
    interval: 3600
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

proxy-groups:
  - name: 🚀 节点选择
    type: select
    use:
      - ConfigForge
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🇨🇭 瑞士节点
      - 🇩🇪 德国节点
      - 🇫🇷 法国节点
      - 🇬🇧 英国节点
      - 🇳🇱 荷兰节点
      - 🇷🇴 罗马尼亚节点
      - 🇷🇺 俄罗斯节点
      - 🇸🇨 塞舌尔节点
      - 🌍 其他地区
      - 🔯 故障转移
      - 🎯 全球直连

  - name: 🇭🇰 香港节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[HK\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇹🇼 台湾节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[TW\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[JP\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇸🇬 狮城节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[SG\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇺🇸 美国节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[US\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇨🇭 瑞士节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[CH\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇩🇪 德国节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[DE\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇫🇷 法国节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[FR\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇬🇧 英国节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[GB\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇳🇱 荷兰节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[NL\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇷🇴 罗马尼亚节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[RO\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇷🇺 俄罗斯节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[RU\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇸🇨 塞舌尔节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[SC\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🌍 其他地区
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[(AT|BD|BE|CA|CO|CZ|ES|IE|IL|IR|IT|KR|MX|NZ|PL|SE|UN|ZA)\]'
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: ♻️ 自动选择
    type: url-test
    use:
      - ConfigForge
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🔯 故障转移
    type: fallback
    use:
      - ConfigForge
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 🌍 国外媒体
    type: select
    use:
      - ConfigForge
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连

  - name: 📺 流媒体
    type: select
    use:
      - ConfigForge
    proxies:
      - 🚀 节点选择
      - 🎯 全球直连

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT


port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 1.1.1.1
    - 8.8.8.8

proxy-providers:
  ConfigForge:
    type: http
    url: "https://raw.githubusercontent.com/WayhomeZ/v2ray_to_Clash/main/docs/proxies.yaml"
    path: ./providers/configforge.yaml
    interval: 3600
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

proxy-groups:
  - name: 🚀 节点选择
    type: select
    use:
      - ConfigForge
    proxies:
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🇦🇪 阿联酋节点
      - 🇦🇹 奥地利节点
      - 🇧🇪 比利时节点
      - 🇨🇦 加拿大节点
      - 🇨🇭 瑞士节点
      - 🇨🇴 哥伦比亚节点
      - 🇩🇪 德国节点
      - 🇩🇰 丹麦节点
      - 🇪🇸 西班牙节点
      - 🇫🇮 芬兰节点
      - 🇫🇷 法国节点
      - 🇬🇧 英国节点
      - 🇮🇪 爱尔兰节点
      - 🇮🇱 以色列节点
      - 🇮🇳 印度节点
      - 🇮🇶 伊拉克节点
      - 🇮🇷 伊朗节点
      - 🇮🇹 意大利节点
      - 🇰🇬 吉尔吉斯斯坦节点
      - 🇰🇷 韩国节点
      - 🇱🇻 拉脱维亚节点
      - 🇲🇽 墨西哥节点
      - 🇳🇱 荷兰节点
      - 🇵🇱 波兰节点
      - 🇷🇴 罗马尼亚节点
      - 🇷🇺 俄罗斯节点
      - 🇸🇨 塞舌尔节点
      - 🇸🇪 瑞典节点
      - 🇹🇭 泰国节点
      - 🇿🇦 南非节点
      - 🔯 故障转移
      - 🎯 全球直连

  - name: 🇭🇰 香港节点
    type: url-test
    use:
      - ConfigForge
    filter: '(?i)^\[HK\]'
    url: https://cp.cloudflare.com/generate_204
